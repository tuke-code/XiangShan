name: Performance Regression Trigger

run-name: "${{ github.event.inputs.note }} - ${{ github.event.inputs.test_branch }} - ${{ github.event.inputs.benchmark_type }}"

on:
  workflow_dispatch:
    inputs:
      note:
        description: Test note, will be displayed in the title
        required: false
        type: string
        default: new/resume
      test_branch:
        description: Branch or commit to run performance test on
        required: false
        type: string
        default: kunminghu-v3
      benchmark_type:
        description: Benchmark type
        required: false
        type: choice
        options:
          - spec06-0.3c
          - spec06-0.8c
          - spec06-1.0c
          - dry-run-test
          # - spec17-0.3c # now it is not support
        default: spec06-0.3c
      use_simfrontend:
        description: Whether to use simfrontend for performance test
        required: false
        type: choice
        options:
          - false
          - true
        default: true
      dump_db:
        description: Whether to dump db during performance test
        required: false
        type: choice
        options:
          - false
          - true
        default: false
      custom_constantin:
        description: Custom constantin.txt path, leave empty to use default one
        required: false
        type: string
        default: ''
      benchmarks:
        description: Specific benchmarks to run (comma-separated), leave empty to run all
        required: false
        type: string
        default: ''
      allow_neighbor_emu_reuse:
        description: Allow reusing emu from sibling performance directories with same commit and config
        required: false
        type: choice
        options:
          - false
          - true
        default: true
      force_clean_spec_dir:
        description: Force recreate SPEC_DIR by deleting existing directory first
        required: false
        type: choice
        options:
          - false
          - true
        default: false
      auto_rerun_on_failure:
        description: Auto rerun the whole workflow when performance-test fails
        required: false
        type: choice
        options:
          - false
          - true
        default: true
      max_workflow_reruns:
        description: Max whole-workflow reruns (0 means unlimited)
        required: false
        type: string
        default: '3'
      rerun_attempt:
        description: Internal rerun counter, do not change unless needed
        required: false
        type: string
        default: '0'
      servers:
        description: Servers to run emulation on, leave empty to let the script select
        required: false
        type: string
        default: node029, node033, node034, node036, node037, node038, node039, node040, node041, node042, node003, node004, node005, node006, node007, node008, node009, node020, node021, node022, node023, node024, node025, node026, node027, node031, node032

jobs:
  performance-test:
    uses: ./.github/workflows/perf-template.yml
    with:
        test_branch: ${{ github.event.inputs.test_branch }}
        benchmark_type: ${{ github.event.inputs.benchmark_type }}
        use_simfrontend: ${{ github.event.inputs.use_simfrontend }}
        dump_db: ${{ github.event.inputs.dump_db }}
        custom_constantin: ${{ github.event.inputs.custom_constantin }}
        allow_neighbor_emu_reuse: ${{ github.event.inputs.allow_neighbor_emu_reuse }}
        force_clean_spec_dir: ${{ github.event.inputs.force_clean_spec_dir }}
        benchmarks: ${{ github.event.inputs.benchmarks }}
        servers: ${{ github.event.inputs.servers }}
        perf_report_dir: /nfs/home/cirunner/perf-report-prefetch2026

  auto-rerun-trigger:
    needs: performance-test
    if: ${{ always() && needs.performance-test.result == 'failure' && github.event_name == 'workflow_dispatch' }}
    runs-on: node
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch next rerun when enabled
        uses: actions/github-script@v7
        with:
          script: |
            const inputs = context.payload.inputs || {};
            const autoRerun = (inputs.auto_rerun_on_failure || 'true') === 'true';
            const currentAttempt = parseInt(inputs.rerun_attempt || '0', 10);
            const maxWorkflowReruns = parseInt(inputs.max_workflow_reruns || '0', 10);

            if (!Number.isInteger(maxWorkflowReruns) || maxWorkflowReruns < 0) {
              core.setFailed(`Invalid max_workflow_reruns: ${inputs.max_workflow_reruns}`);
              return;
            }

            if (!Number.isInteger(currentAttempt) || currentAttempt < 0) {
              core.setFailed(`Invalid rerun_attempt: ${inputs.rerun_attempt}`);
              return;
            }

            if (!autoRerun) {
              core.info('auto_rerun_on_failure=false, skip rerun dispatch.');
              return;
            }

            if (maxWorkflowReruns > 0 && currentAttempt >= maxWorkflowReruns) {
              core.info(`Reached rerun limit: ${currentAttempt}/${maxWorkflowReruns}.`);
              return;
            }

            const nextAttempt = String(currentAttempt + 1);
            const ref = (context.ref || '').replace('refs/heads/', '');

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'perf-trigger.yml',
              ref,
              inputs: {
                ...inputs,
                rerun_attempt: nextAttempt,
              },
            });

            core.info(`Dispatched next workflow rerun: attempt ${nextAttempt}/${maxWorkflowReruns}.`);
