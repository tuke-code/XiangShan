name: Performance Regression Trigger

run-name: "${{ github.event.inputs.note }} - ${{ github.event.inputs.test_branch }} - ${{ github.event.inputs.benchmark_type }} - ${{ github.event.inputs.l2pf_tlow0 }} - ${{ github.event.inputs.l2pf_peHoldWeightLog0 }} - ${{ github.event.inputs.l2pf_peL1PfCacheHitWeightLog0 }}"

on:
  workflow_dispatch:
    inputs:
      note:
        description: Test note, will be displayed in the title
        required: false
        type: string
        default: new/resume
      test_branch:
        description: Branch or commit to run performance test on
        required: false
        type: string
        default: kunminghu-v3
      benchmark_type:
        description: Benchmark type
        required: false
        type: choice
        options:
          - spec06-0.3c
          - spec06-0.8c
          - spec06-1.0c
          - dry-run-test
          # - spec17-0.3c # now it is not support
        default: spec06-0.3c
      use_simfrontend:
        description: Whether to use simfrontend for performance test
        required: false
        type: choice
        options:
          - false
          - true
        default: true
      custom_constantin:
        description: Custom constantin.txt path, leave empty to use default one
        required: false
        type: string
        default: ''
      allow_neighbor_emu_reuse:
        description: Allow reusing emu from sibling performance directories with same commit and config
        required: false
        type: choice
        options:
          - false
          - true
        default: false
      force_clean_spec_dir:
        description: Force recreate SPEC_DIR by deleting existing directory first
        required: false
        type: choice
        options:
          - false
          - true
        default: false
      benchmarks:
        description: Specific benchmarks to run (comma-separated), leave empty to run all
        required: false
        type: string
        default: ''
      servers:
        description: Servers to run emulation on, leave empty to let the script select
        required: false
        type: string
        default: node029, node033, node034, node036, node037, node038, node039, node040, node041, node042, node003, node004, node005, node006, node007, node008, node009, node020, node021, node022, node023, node024, node025, node026, node027
      l2pf_tlow0:
        description: Custom constantin value for l2pf_tlow0
        required: false
        type: string
        default: '1'
      l2pf_peHoldWeightLog0:
        description: Custom constantin value for l2pf_peHoldWeightLog0
        required: false
        type: string
        default: '3'
      l2pf_peL1PfCacheHitWeightLog0:
        description: Custom constantin value for l2pf_peL1PfCacheHitWeightLog0
        required: false
        type: string
        default: '2'

jobs:
  prepare-constantin:
    runs-on: node
    outputs:
      custom_constantin_path: ${{ steps.prepare.outputs.custom_constantin_path }}
    steps:
      - name: Prepare custom constantin
        id: prepare
        run: |
          BASE_DIR=/nfs/home/cirunner/ci/constantin
          mkdir -p "$BASE_DIR"

          TEMP_PATH="$BASE_DIR/${{ github.run_id }}-$(date +%s).txt"
          : > "$TEMP_PATH"

          CUSTOM_FILE=""
          if [ "${{ github.event.inputs.l2pf_tlow0 }}" != "1" ]; then
            CUSTOM_FILE="${CUSTOM_FILE:+${CUSTOM_FILE}-}l2pf_tlow0-${{ github.event.inputs.l2pf_tlow0 }}"
            echo "l2pf_tlow0 ${{ github.event.inputs.l2pf_tlow0 }}" >> "$TEMP_PATH"
          fi
          if [ "${{ github.event.inputs.l2pf_peHoldWeightLog0 }}" != "3" ]; then
            CUSTOM_FILE="${CUSTOM_FILE:+${CUSTOM_FILE}-}l2pf_peHoldWeightLog0-${{ github.event.inputs.l2pf_peHoldWeightLog0 }}"
            echo "l2pf_peHoldWeightLog0 ${{ github.event.inputs.l2pf_peHoldWeightLog0 }}" >> "$TEMP_PATH"
          fi
          if [ "${{ github.event.inputs.l2pf_peL1PfCacheHitWeightLog0 }}" != "2" ]; then
            CUSTOM_FILE="${CUSTOM_FILE:+${CUSTOM_FILE}-}l2pf_peL1PfCacheHitWeightLog0-${{ github.event.inputs.l2pf_peL1PfCacheHitWeightLog0 }}"
            echo "l2pf_peL1PfCacheHitWeightLog0 ${{ github.event.inputs.l2pf_peL1PfCacheHitWeightLog0 }}" >> "$TEMP_PATH"
          fi

          INPUT_CUSTOM="${{ github.event.inputs.custom_constantin }}"

          if [ -n "$CUSTOM_FILE" ]; then
            if [ -n "$INPUT_CUSTOM" ]; then
              CUSTOM_BASENAME=$(basename "$INPUT_CUSTOM" .txt)
              CUSTOM_FILE="${CUSTOM_FILE}-${CUSTOM_BASENAME}"
              cat "$INPUT_CUSTOM" >> "$TEMP_PATH"
            fi

            FINAL_PATH="$BASE_DIR/${CUSTOM_FILE}.txt"
            mv "$TEMP_PATH" "$FINAL_PATH"
          else
            rm -f "$TEMP_PATH"
            FINAL_PATH="$INPUT_CUSTOM"
          fi

          echo "custom_constantin_path=$FINAL_PATH" >> "$GITHUB_OUTPUT"

  performance-test:
    needs: prepare-constantin
    uses: ./.github/workflows/perf-template.yml
    with:
        test_branch: ${{ github.event.inputs.test_branch }}
        benchmark_type: ${{ github.event.inputs.benchmark_type }}
        use_simfrontend: ${{ github.event.inputs.use_simfrontend }}
        custom_constantin: ${{ needs.prepare-constantin.outputs.custom_constantin_path }}
        allow_neighbor_emu_reuse: ${{ github.event.inputs.allow_neighbor_emu_reuse }}
        force_clean_spec_dir: ${{ github.event.inputs.force_clean_spec_dir }}
        benchmarks: ${{ github.event.inputs.benchmarks }}
        servers: ${{ github.event.inputs.servers }}
        perf_report_dir: /nfs/home/cirunner/perf-report-prefetch2026
