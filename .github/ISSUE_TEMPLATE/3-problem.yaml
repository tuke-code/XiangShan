name: Problem
description: Problem encountered when compiling XiangShan, running EMU, etc.
labels:
  - 'type: problem'
body:
  - type: markdown
    attributes:
      value: |
        This template is only for problems encountered when compiling XiangShan, running EMU, or using related workflows. If this does not match your case, please go back and choose another template.

        这个 issue 模板仅用于处理您在编译香山、运行 EMU 等时遇到的问题。如果您遇到的不是此类问题，请回退并选择其他模板。
  - type: checkboxes
    id: before-start
    attributes:
      label: Before start
      description: |
        Before you start, please read the [Before contributing](https://github.com/OpenXiangShan/XiangShan/blob/kunminghu-v3/CONTRIBUTING.md#before-contributing) section, and confirm the following items:

        开始之前，请阅读[贡献前须知](https://github.com/OpenXiangShan/XiangShan/blob/kunminghu-v3/CONTRIBUTING.zh-cn.md#贡献前须知)，并确认以下事项：
      options:
        - label: I have read the [RISC-V ISA Manual](https://github.com/riscv/riscv-isa-manual) and [XiangShan Documents](https://docs.xiangshan.cc/zh-cn/latest), and I believe this issue is related to XiangShan. 我已经阅读过 [RISC-V 指令集手册](https://github.com/riscv/riscv-isa-manual) 和 [香山文档](https://docs.xiangshan.cc/zh-cn/latest)，确认这应该是香山相关的问题。
          required: true
        - label: I have searched previous issues and PRs and did not find anything relevant. 我已经搜索过之前的 issue 和 PR，并没有找到相关的。
          required: true
        - label: I have reproduced the problem using the latest commit on the default branch. 我已经使用默认分支最新的 commit 复现了问题。
          required: true
        - label: If this report was generated with AI assistance (otherwise leave unchecked), I have verified the correctness of its content. 如果这是由 AI 生成的（否则请不要勾选），我已经验证了内容的正确性。
          required: false
  - type: dropdown
    id: branch
    attributes:
      label: Branch
      description: |
        Please select the branch you are using.

        请选择您使用的分支。
      options:
        - kunminghu-v2
        - kunminghu-v3
        - nanhu
        - yanqihu
        - Other (please specify in "Additional context" section)
    validations:
      required: true
  - type: textarea
    id: describe
    attributes:
      label: Describe your problem
      description: |
        A clear and concise description of what the problem is.

        请清晰、准确地描述您遇到的问题。

        If applicable, add screenshots / logs to help explain your problem.

        如果可能，请提供有助于您描述问题的屏幕截图和日志。

        Please upload logs as attachments, do not paste them directly into the text box.

        请使用附件的形式上传日志，不要直接粘贴到文本框中。
      placeholder:
    validations:
      required: true
  - type: textarea
    id: what-did
    attributes:
      label: What did you do before
      description: |
        Please describe step by step what you did before you encountered the problem.

        请描述您遇到问题前都做了哪些操作。

        This will help us to reproduce your problem.

        这将有助于我们复现您的问题。
      placeholder:
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide your environment information.

        请提供您的环境信息。

        You can use `./scripts/bug-report.sh` to collect the environment information and generate a report file, and then upload the report file as an attachment.

        您可以使用 `./scripts/bug-report.sh` 来收集环境信息并生成报告文件，然后将报告文件作为附件上传。

        If you cannot upload the report file, please fill in the form as much as possible.

        如果不便上传报告文件，请尽可能填写此表单。
      placeholder:
      value: |
        - Hardware
          - CPU:
          - Memory (GB):
          - Storage (GB):
        - Software
          - Operating system:
          - gcc version: <!-- run `gcc --version 2>&1 | head -n 1` to get the version -->
          - clang version: <!-- run `clang --version 2>&1 | head -n 1` to get the version, only needed when you use clang -->
          - java version: <!-- run `java -version 2>&1 | head -n 1` to get the version -->
          - mill version: <!-- run `mill -i --version 2>&1 | head -n 1` to get the version -->
        - Repo
          - XiangShan commit id: ``
          - NEMU commit id (if difftest failed with NEMU): ``
          - SPIKE commit id (if difftest failed with SPIKE): ``
        - Build & Run
          - Build command: ``
          - Run command (if applicable): ``
          - Also upload workload (binary and source code) if applicable.
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: |
        Add any other context about the problem here.

        可在此处附上其他相关信息。
      placeholder:
    validations:
      required: false
